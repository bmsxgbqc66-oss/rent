<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Волга.Аренда Premium Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-dark: #1A202C; /* Глубокий темный для текста */
            --p-gold: #B79455; /* Золотой акцент */
            --p-blue: #2C5282; /* Глубокий синий */
            --p-bg: #F7FAFC;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 20px 10px; 
            background-color: #E2E8F0; 
            font-family: 'Montserrat', sans-serif; color: var(--p-dark);
        }

        .app-container {
            max-width: 450px; margin: 0 auto;
            background: var(--white); padding: 25px;
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 { font-family: 'Playfair Display', serif; text-align: center; margin: 0; font-size: 28px; }
        .subtitle { text-align: center; font-size: 11px; color: var(--p-gold); letter-spacing: 2px; font-weight: 600; margin-bottom: 25px; }

        label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 6px 4px; color: #4A5568; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 14px; border: 2px solid #EDF2F7; border-radius: 14px;
            font-size: 15px; background: #F8FAFC; color: var(--p-dark);
        }
        input:focus { border-color: var(--p-blue); outline: none; background: #FFF; }

        .btn-main {
            background: var(--p-blue); color: white; border: none; padding: 18px;
            width: 100%; border-radius: 16px; font-size: 16px; font-weight: 600;
            margin-top: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(44,82,130,0.3);
        }

        /* Секция Истории */
        .history-section { margin-top: 35px; }
        .history-title { font-size: 14px; font-weight: 600; border-bottom: 2px solid var(--p-gold); display: inline-block; margin-bottom: 15px; }
        
        .history-card {
            background: #F8FAFC; border-left: 5px solid var(--p-blue);
            padding: 12px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        .history-card:active { background: #EDF2F7; }
        .h-info b { display: block; font-size: 14px; }
        .h-info span { color: #718096; font-size: 11px; }
        .h-amount { text-align: right; font-weight: 600; }
        .amt-pos { color: #2F855A; }
        .amt-neg { color: #C53030; }

        #status { font-size: 10px; text-align: center; margin-bottom: 15px; font-weight: 600; color: var(--p-blue); }
    </style>
</head>
<body onload="init()">

<div class="app-container">
    <div id="status">СИСТЕМА ГОТОВА</div>
    <h1>Волга.Аренда</h1>
    <div class="subtitle">ESTATE MANAGEMENT</div>

    <input type="hidden" id="f-id"> <!-- Скрытое поле для ID (редактирование) -->

    <label>Объект и Дата</label>
    <div style="display: flex; gap: 8px;">
        <select id="f-obj" style="flex: 2;">
            <option value="Берег Волги">🌊 Берег Волги</option>
            <option value="Санторини">🏛️ Санторини</option>
        </select>
        <input type="date" id="f-date" style="flex: 2;">
    </div>

    <label>Детали (Гость / Расход)</label>
    <input type="text" id="f-desc" placeholder="Имя гостя или название магазина">

    <div style="display: flex; gap: 8px;">
        <div style="flex: 1;">
            <label>Сумма ₽</label>
            <input type="number" id="f-sum" placeholder="0">
        </div>
        <div style="flex: 1;">
            <label>Категория</label>
            <select id="f-cat">
                <option value="Аренда">🛌 Аренда</option>
                <option value="Переменные">🧼 Переменные</option>
                <option value="Опт/Склад">📦 Опт/Склад</option>
                <option value="Постоянные">💡 Постоянные</option>
                <option value="Комиссия">🧧 Комиссия</option>
            </select>
        </div>
    </div>

    <label>Тип операции</label>
    <select id="f-type">
        <option value="Доход">📈 ДОХОД (Поступление)</option>
        <option value="Расход">📉 РАСХОД (Трата)</option>
    </select>

    <button class="btn-main" id="save-btn" onclick="sendToCloud()">ЗАПИСАТЬ В ТАБЛИЦУ</button>

    <div class="history-section">
        <div class="history-title">ПОСЛЕДНИЕ ЗАПИСИ (из памяти)</div>
        <div id="history-list">
            <!-- Сюда будут падать записи -->
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwO9_WJDS8KHNgUAohpu7IC5pVyRM3o8LfAJcUj5ZHS5hdToOykU8A0-rEDPWmkr03I/exec';

    function init() {
        document.getElementById('f-date').valueAsDate = new Date();
        renderHistory();
    }

    async function sendToCloud() {
        const btn = document.getElementById('save-btn');
        const status = document.getElementById('status');
        
        const data = {
            id: document.getElementById('f-id').value || Date.now(),
            date: document.getElementById('f-date').value,
            obj: document.getElementById('f-obj').value,
            desc: document.getElementById('f-desc').value,
            sum: document.getElementById('f-sum').value,
            type: document.getElementById('f-type').value,
            cat: document.getElementById('f-cat').value
        };

        if(!data.sum || !data.desc) { alert('Заполните сумму и описание'); return; }

        btn.disabled = true;
        status.innerText = 'ОТПРАВКА В ГУГЛ ТАБЛИЦЫ...';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });

            // Сохраняем локально для истории
            saveLocally(data);
            
            status.innerText = 'УСПЕШНО СОХРАНЕНО';
            resetForm();
            renderHistory();
        } catch (e) {
            status.innerText = 'ОШИБКА СЕТИ, НО СОХРАНЕНО ЛОКАЛЬНО';
            saveLocally(data);
            renderHistory();
        } finally {
            btn.disabled = false;
        }
    }

    function saveLocally(newItem) {
        let history = JSON.parse(localStorage.getItem('rent_history_v6.1') || '[]');
        const index = history.findIndex(item => item.id == newItem.id);
        
        if(index > -1) history[index] = newItem; // Если редактируем
        else history.unshift(newItem); // Если новая запись
        
        localStorage.setItem('rent_history_v6.1', JSON.stringify(history.slice(0, 15)));
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem('rent_history_v6.1') || '[]');
        list.innerHTML = history.length ? '' : '<p style="font-size:12px; color:#A0AEC0;">Записей пока нет</p>';
        
        history.forEach(item => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.onclick = () => editItem(item.id);
            
            const isInc = item.type === 'Доход';
            card.innerHTML = `
                <div class="h-info">
                    <b>${item.desc}</b>
                    <span>${item.obj} • ${item.date}</span>
                </div>
                <div class="h-amount ${isInc ? 'amt-pos' : 'amt-neg'}">
                    ${isInc ? '+' : '-'}${item.sum} ₽
                    <div style="font-size:10px; font-weight:400; color:#718096;">${item.cat}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function editItem(id) {
        const history = JSON.parse(localStorage.getItem('rent_history_v6.1') || '[]');
        const item = history.find(i => i.id == id);
        if(!item) return;

        document.getElementById('f-id').value = item.id;
        document.getElementById('f-date').value = item.date;
        document.getElementById('f-obj').value = item.obj;
        document.getElementById('f-desc').value = item.desc;
        document.getElementById('f-sum').value = item.sum;
        document.getElementById('f-type').value = item.type;
        document.getElementById('f-cat').value = item.cat;
        
        document.getElementById('save-btn').innerText = 'ОБНОВИТЬ ЗАПИСЬ';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('f-id').value = '';
        document.getElementById('f-desc').value = '';
        document.getElementById('f-sum').value = '';
        document.getElementById('save-btn').innerText = 'ЗАПИСАТЬ В ТАБЛИЦУ';
    }
</script>

</body>
</html>
